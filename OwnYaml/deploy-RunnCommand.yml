apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test
  name: test
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - image: httpd:2-alpine3.23
          name: httpd
          command: ["/bin/bash", "-C"] # override the default command
          args: ["sleep 5; exit 1"] #sleep fpr 30 sec then exit with error 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
